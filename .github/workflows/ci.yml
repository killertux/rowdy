name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: rowdy
          POSTGRES_PASSWORD: rowdy
          POSTGRES_DB: rowdy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rowdy -d rowdy_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: rowdy
          MYSQL_USER: rowdy
          MYSQL_PASSWORD: rowdy
          MYSQL_DATABASE: rowdy_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -prowdy --silent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      ROWDY_POSTGRES_URL: postgres://rowdy:rowdy@localhost:5432/rowdy_test
      ROWDY_MYSQL_URL: mysql://rowdy:rowdy@localhost:3306/rowdy_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-targets --locked
