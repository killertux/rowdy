[package]
name = "rowdy"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
async-trait = "0.1.83"
chrono = "0.4.44"
clap = { version = "4.6.1", features = ["derive"] }
crossterm = { version = "0.29.0", features = ["event-stream"] }
edtui = "0.11.2"
futures = "0.3.31"
ratatui = "0.30.0"
serde_json = "1.0.149"
sqlx = { version = "0.8.6", default-features = false, features = ["runtime-tokio", "sqlite", "postgres", "mysql", "chrono", "uuid", "json"] }
tokio = { version = "1.52.1", features = ["rt-multi-thread", "macros", "sync", "time"] }
uuid = { version = "1.23.1", features = ["v4"] }
