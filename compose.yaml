# Local development databases for the Postgres / MySQL driver tests.
# Spin up with `docker compose up -d`, then run the integration tests:
#
#   ROWDY_POSTGRES_URL=postgres://rowdy:rowdy@localhost:55432/rowdy_test \
#   ROWDY_MYSQL_URL=mysql://rowdy:rowdy@localhost:53306/rowdy_test \
#   cargo test
#
# Ports are deliberately non-default (55432 / 53306) so they don't collide
# with a system Postgres / MySQL on the standard ports. CI runs the same
# containers via GitHub Actions `services` and uses the standard ports.

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: rowdy
      POSTGRES_PASSWORD: rowdy
      POSTGRES_DB: rowdy_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rowdy -d rowdy_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: rowdy
      MYSQL_USER: rowdy
      MYSQL_PASSWORD: rowdy
      MYSQL_DATABASE: rowdy_test
    ports:
      - "53306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -prowdy --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
